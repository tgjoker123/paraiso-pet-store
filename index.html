<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraíso Pet Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Barra de Promoção Superior */
        .promo-bar {
            background: var(--accent);
            color: white;
            text-align: center;
            height: var(--promo-bar-height);
            display:flex; align-items:center; justify-content:center;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            position: sticky;
            top: 0;
            z-index: 1001;
            box-shadow: 0 4px 18px rgba(0,0,0,0.12);
        }

        .promo-bar b {
            background: white;
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 5px;
            margin-left: 5px;
            text-transform: uppercase;
        }

        header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            padding: 18px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: var(--promo-bar-height);
            z-index: 1000;
        }

        body {
            cursor: default;
        }

        button, .cat-card, .logo {
            cursor: pointer;
        }

        .cat-container::-webkit-scrollbar {
            height: 6px;
        }

        .cat-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .cat-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .cat-container::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        .cat-container {
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        :root {
            --primary: #2f4f6f;
            --primary-light: #4a6d8d;
            --secondary: #2a8a44;
            --accent: #f39c12;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --white: #ffffff;
            --danger: #e74c3c;
            --insta: #E1306C;
            --whats: #25D366;
            --maps: #4285F4;
            --shadow: 0 12px 40px rgba(0,0,0,0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --promo-bar-height: 52px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { font-size: 16px; }
        
        body { 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--light); 
            color: var(--dark); 
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
            line-height: 1.45;
            font-size: 0.98rem;
        }

        .content {
            flex: 1;
        }

        footer {
            width: 100%;
            background: #2c3e50;
            color: white;
            padding: 28px 20px 20px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
            max-width: 1100px;
            margin: 0 auto;
        }

        .footer-grid h2 {
            margin-bottom: 10px;
            font-size: 1.7rem;
        }

        .footer-grid a {
            margin-right: 10px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-grid iframe {
            width: 100%;
            height: 200px;
            border: 0;
            border-radius: 18px;
        }

        @media (max-width: 900px) {
            .footer-grid {
                grid-template-columns: 1fr;
            }
            .footer-grid iframe {
                height: 180px;
            }
        }

        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(74, 109, 141, 0.9) 0%, rgba(44, 62, 80, 0.85) 100%),
                        url('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; z-index: -1;
        }

        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo i { font-size: 2rem; color: var(--primary); }
        .logo h1 { font-family: 'Fredoka One', cursive; font-size: 1.9rem; color: var(--primary); letter-spacing: 0.6px; margin:0; }

        .nav-actions { display: flex; gap: 12px; align-items: center; }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            font-size: 0.95rem;
            box-shadow: 0 8px 20px rgba(47,79,111,0.08);
        }
        
        .btn-cart { background: var(--secondary); color: white; position: relative; padding: 9px 14px; border-radius: 10px; }
        .cart-badge {
            position: absolute; top: -5px; right: -5px;
            background: var(--accent); color: white;
            font-size: 0.75rem; padding: 2px 8px; border-radius: 50%;
            border: 2px solid white;
        }
        .btn-admin { background: var(--dark); color: white; }
        .btn-login { background: var(--primary); color: white; }
        .btn-logout { background: var(--danger); color: white; }
        .btn-green { background: linear-gradient(90deg,var(--secondary),#3cb270); color: white; width: 100%; justify-content: center; border-radius: 10px; padding: 12px 18px; box-shadow: 0 12px 30px rgba(44,138,68,0.14); }

        .search-box {
            background: var(--white);
            display: flex;
            align-items: center;
            padding: 8px 18px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(47,79,111,0.04);
            border: 1px solid #eef2f5;
            margin: 0 auto 20px;
            max-width: 900px;
        }
        .search-box input {
            border: none;
            outline: none;
            padding: 12px;
            width: 100%;
            font-size: 1rem;
        }

        button:hover, .cat-card:hover, .logo:hover {
            opacity: 0.95;
        }
        button:focus-visible, .cat-card:focus-visible, .logo:focus-visible {
            outline: 3px solid rgba(33, 150, 243, 0.8);
            outline-offset: 3px;
        }
        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .cat-container {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 18px;
            scrollbar-width: thin;
        }
        .cat-card {
            background: var(--white); padding: 8px 16px; border-radius: 999px;
            cursor: pointer; white-space: nowrap; font-size: 0.9rem; font-weight: 600;
            border: 1px solid #f0f2f5; transition: var(--transition);
        }
        .cat-card.active { background: var(--primary); color: white; border-color: var(--primary); }

        .page { display: none; padding: 20px 8% 100px; animation: fadeIn 0.4s ease-in-out; }
        .active-page { display: block; }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; max-width: 1400px; margin: 0 auto;
        }

        .product-card {
            background: var(--white); border-radius: 18px; padding: 20px;
            text-align: center; transition: var(--transition); box-shadow: 0 10px 18px rgba(47,79,111,0.04);
            position: relative; border: 1px solid #f3f6f8;
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 18px 40px rgba(47,79,111,0.06); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 14px; }
        .product-card h3 { min-height: 48px; }
        
        .stock-indicator {
            position: absolute; top: 20px; left: 20px;
            padding: 5px 12px; border-radius: 15px; font-size: 0.7rem; font-weight: 700;
            z-index: 10;
        }
        .stock-ok { background: #e8f5e9; color: #2e7d32; }
        .stock-none { background: #ffebee; color: #c62828; }

        .admin-container { max-width: 960px; margin: 0 auto; background: var(--white); padding: 32px; border-radius: 18px; box-shadow: 0 12px 30px rgba(47,79,111,0.05); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-field { padding: 12px; border-radius: 12px; border: 2px solid #eee; outline: none; width: 100%; }
        
        .inventory-card {
            display: flex; align-items: center; justify-content: space-between;
            background: #f9f9f9; padding: 15px 20px; border-radius: 15px; margin-bottom: 10px;
            border-left: 5px solid var(--primary);
        }
        .btn-edit { background: var(--primary); color: white; border: none; padding: 5px 15px; border-radius: 8px; cursor: pointer; margin-right: 5px; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 15px; border-radius: 8px; cursor: pointer; }

        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; display: none; backdrop-filter: blur(4px); }
        .cart-sidebar {
            position: fixed; right: -420px; top: 0; width: 380px; height: 100%;
            background: var(--white); z-index: 2000; padding: 30px 24px;
            transition: 0.45s; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(47,79,111,0.08);
        }
        .cart-sidebar.open { right: 0; }

        @media (max-width: 1000px) {
            header { padding: 15px 5%; }
            .page { padding: 20px 5% 100px; }
            .admin-container { padding: 25px; }
            .form-row { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
            .cart-sidebar { width: 100%; max-width: 420px; }
            .search-box { padding: 10px 16px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="promo-bar">
    OFERTA ESPECIAL: 10% OFF ATÉ 20/09! Use o cupom: <b>PET10</b>
</div>

<div class="main-bg"></div>

<header>
    <a href="#" class="logo" onclick="showPage('page-loja')">
        <i class="fa-solid fa-paw"></i>
        <h1>Paraíso Pet Store</h1>
    </a>
    <div class="nav-actions">
        <button type="button" class="btn btn-cart" onclick="toggleCart()" aria-label="Abrir carrinho">
            <i class="fa-solid fa-shopping-basket"></i>
            <span id="cart-badge" class="cart-badge">0</span>
        </button>
        <button type="button" id="nav-admin" class="btn btn-admin" onclick="attemptAdminAccess()">
            <i class="fa-solid fa-chart-line"></i>
        </button>
        <button type="button" id="nav-login" class="btn btn-login" onclick="showPage('page-auth')">
            <i class="fa-solid fa-user-circle"></i>
        </button>
        <button type="button" id="nav-logout" class="btn btn-logout" style="display:none" onclick="handleLogout()">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </div>
</header>

<main class="content">
    <section id="page-loja" class="page active-page">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" id="shop-search" aria-label="Busca de produtos" placeholder="O que seu pet precisa?" onkeyup="filterShop()">
        </div>

        <div class="cat-container" id="shop-cats">
            <div class="cat-card active" onclick="filterMain('todos', this)">Todos</div>
            <div class="cat-card" onclick="filterMain('racoes', this)">Rações</div>
            <div class="cat-card" onclick="filterMain('remedios', this)">Remédios</div>
            <div class="cat-card" onclick="filterMain('antiparasitario', this)">Antiparasitários</div>
            <div class="cat-card" onclick="filterMain('camas', this)">Camas</div>
            <div class="cat-card" onclick="filterMain('petiscos', this)">Petiscos</div>
            <div class="cat-card" onclick="filterMain('acessorio', this)">Acessórios</div>
        </div>

        <div id="sub-cats-container" class="cat-container" style="display: none; margin-top: 10px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 50px;"></div>

        <div id="shop-container" class="products-grid"></div>
    </section>

    <section id="page-admin" class="page">
        <div class="admin-container">
            <h2 id="adm-form-title" style="margin-bottom: 20px; color: var(--primary)">Gerenciar Produtos</h2>
            
            <button type="button" class="btn" style="margin-bottom:20px; background:#f0f4f8" onclick="showPage('page-loja')">
                 Voltar para loja
            </button>

            <div style="background: #f0f4f8; padding: 25px; border-radius: 20px; margin-bottom: 30px;">
                <input type="hidden" id="form-id">
                <div class="form-group" style="margin-bottom: 15px;">
                    <input type="text" id="form-nome" class="input-field" placeholder="Nome Completo do Produto" aria-label="Nome do produto">
                </div>
                <div class="form-row">
                    <select id="form-cat" class="input-field">
                        <option value="caes">Rações para Cães</option>
                        <option value="gatos">Rações para Gatos</option>
                        <option value="remedioscaes">Remédios para Cães</option>
                        <option value="remediosgatos">Remédios para Gatos</option>
                        <option value="antiparasitriocaes">Antiparasitários para Cães</option>
                        <option value="antiparasitriogatos">Antiparasitários para Gatos</option>
                        <option value="camacao">Camas para Cães</option>
                        <option value="camagato">Camas para Gatos</option>
                        <option value="acessoriocao">Acessórios para Cães</option>
                        <option value="acessoriogato">Acessórios para Gatos</option>
                        <option value="petiscocao">Petiscos para Cães</option>
                        <option value="petiscogato">Petiscos para Gatos</option>
                    </select>
                    <input type="number" step="0.01" id="form-preco" class="input-field" placeholder="Preço R$" aria-label="Preço do produto">
                    <input type="number" id="form-estoque" class="input-field" placeholder="Estoque" aria-label="Estoque do produto">
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <input type="text" id="form-img" class="input-field" placeholder="Link da Imagem" aria-label="URL da imagem do produto">
                </div>
                <button type="button" class="btn btn-green" onclick="saveProduct()">Salvar no catálogo</button>
                <button type="button" id="btn-cancel" class="btn" style="display:none; margin-top:10px; background:#ddd" onclick="resetForm()">Cancelar edição</button>
            </div>

            <div style="background: #fff3e0; padding: 25px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #ffe0b2;">
                <h3 style="margin-bottom: 15px; color: #e65100;"><i class="fa-solid fa-ticket"></i> Novo Cupom de Desconto</h3>
                <div class="form-row">
                    <input type="text" id="cupom-nome" class="input-field" placeholder="Ex: PET10" aria-label="Nome do cupom">
                    <input type="number" id="cupom-valor" class="input-field" placeholder="Desconto % (Ex: 10)" aria-label="Valor do cupom">
                    <button type="button" class="btn btn-green" onclick="criarCupom()">Criar Cupom</button>
                </div>
            </div>

            <hr style="margin-bottom: 30px;">

            <div class="cupons-container" style="margin-top: 20px; margin-bottom: 30px;">
                <h3 style="margin-bottom: 15px; color: #1a365d;"><i class="fa-solid fa-tags"></i> Cupons Ativos no Banco</h3>
                <div id="cupons-lista"></div>
            </div>

            <div class="inventario-container" style="margin-top: 20px;">
                <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-boxes-stacked"></i> Inventário de Itens</h3>
                <div class="search-box">
                    <i class="fa-solid fa-search" aria-hidden="true"></i>
                    <input type="text" id="admin-search" aria-label="Pesquisar estoque" placeholder="Pesquisar no estoque..." onkeyup="filterAdmin()">
                </div>
                <div id="admin-inventory-list"></div>
            </div>
        </div>
    </section>

    <section id="page-auth" class="page">
        <div class="admin-container" style="max-width: 400px; text-align: center;">
            <h2>Acesso Administrativo</h2>
            <input type="text" id="login-user" class="input-field" placeholder="Usuário" style="margin: 20px 0 10px;" aria-label="Usuário administrativo">
            <input type="password" id="login-pass" class="input-field" placeholder="Senha" style="margin-bottom: 20px;" aria-label="Senha administrativa">
            <button type="button" class="btn btn-green" onclick="handleLogin()">Entrar</button>
        </div>
    </section>
</main>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<aside class="cart-sidebar" id="cart-sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h2>Seu Carrinho</h2>
        <button type="button" onclick="toggleCart()" aria-label="Fechar carrinho" style="background:none; border:none; font-size: 1.5rem; cursor:pointer; color:#555">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>
    <div id="cart-items-list" style="flex-grow:1; overflow-y:auto"></div>
    <div style="border-top: 2px solid #eee; padding-top: 20px;">
        <div style="display:flex; gap:5px; margin-bottom:15px">
            <input type="text" id="coupon" placeholder="Cupom de desconto" class="input-field" aria-label="Campo de cupom">
            <button type="button" class="btn" style="background:var(--primary); color:white" onclick="applyCoupon()">Aplicar</button>
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <span style="font-weight:600">Total:</span>
            <span id="cart-total" style="font-size:1.5rem; font-weight:700; color:var(--secondary)">R$ 0,00</span>
        </div>
        <button type="button" class="btn btn-green" onclick="checkout()" style="background: #25D366;">
            <i class="fa-brands fa-whatsapp"></i> Finalizar pedido via WhatsApp
        </button>
    </div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ==========================================
// CONFIGURAÇÕES E CONEXÃO COM A SUPABASE
// ==========================================
const SUPABASE_URL = "https://hslutdszbqbgvpazqubp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzbHV0ZHN6YnFiZ3ZwYXpxdWJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NDczMTMsImV4cCI6MjA5ODMyMzMxM30.c7TQIUdpdNM8Mk3gjxP8j4YExVFogYjLCUeugkcgMfo";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const WHATS_NUMBER = "5524992030852";
let products = []; 
let cart = [];
let currentShopCat = 'todos';
let currentAdminCat = 'todos';
let descontoAtivo = 0;
let cupomAplicadoNome = "";

// MAPA DE SUBCATEGORIAS
const subMenuMap = {
    'racoes': [{ nome: 'Para Cães', id: 'caes' }, { nome: 'Para Gatos', id: 'gatos' }],
    'remedios': [{ nome: 'Para Cães', id: 'remedioscaes' }, { nome: 'Para Gatos', id: 'remediosgatos' }],
    'antiparasitario': [{ nome: 'Para Cães', id: 'antiparasitriocaes' }, { nome: 'Para Gatos', id: 'antiparasitriogatos' }],
    'camas': [{ nome: 'Para Cães', id: 'camacao' }, { nome: 'Para Gatos', id: 'camagato' }],
    'petiscos': [{ nome: 'Para Cães', id: 'petiscocao' }, { nome: 'Para Gatos', id: 'petiscogato' }],
    'acessorio': [{ nome: 'Para Cães', id: 'acessoriocao' }, { nome: 'Para Gatos', id: 'acessoriogato' }]
};

// --- BUSCAR PRODUTOS DA SUPABASE ---
async function loadProductsFromSupabase() {
    try {
        const { data, error } = await db
            .from('produtos')
            .select('*')
            .order('nome', { ascending: true });

        if (error) throw error;
        
        products = data || [];
        renderShop();
        if (document.getElementById('page-admin')?.classList.contains('active-page')) {
            renderAdmin();
        }
    } catch (error) {
        console.error("Erro ao buscar produtos:", error);
    }
}

// --- NAVEGAÇÃO ---
function showPage(id) {
    if(id === 'page-admin' && !localStorage.getItem('petstore_session')) {
        alert('Acesso administrativo restrito. Faça login como administrador.');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('page-auth').classList.add('active-page');
        return;
    }
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    const targetPage = document.getElementById(id);
    if(targetPage) targetPage.classList.add('active-page');
    
    if(id === 'page-loja') renderShop();
    if(id === 'page-admin') { renderAdmin(); renderCupons(); }
}

function setCategory(cat, el, context) {
    if(context === 'shop') { currentShopCat = cat; renderShop(); }
    else { currentAdminCat = cat; renderAdmin(); }
}

function filterShop() { renderShop(); }
function filterAdmin() { renderAdmin(); }

function filterMain(mainCat, el) {
    document.querySelectorAll('#shop-cats .cat-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const subContainer = document.getElementById('sub-cats-container');
    if(!subContainer) return;
    
    if (mainCat === 'todos' || !subMenuMap[mainCat]) {
        subContainer.style.display = 'none';
        setCategory(mainCat, el, 'shop'); 
    } else {
        subContainer.style.display = 'flex';
        subContainer.innerHTML = '';
        subMenuMap[mainCat].forEach(sub => {
            const btn = document.createElement('div');
            btn.className = 'cat-card';
            btn.innerHTML = sub.nome;
            btn.onclick = function() {
                document.querySelectorAll('#sub-cats-container .cat-card').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                setCategory(sub.id, this, 'shop');
            };
            subContainer.appendChild(btn);
        });
        setCategory(mainCat, el, 'shop');
    }
}

// ======================
// RENDERIZAÇÃO DA LOJA
// ======================
function renderShop() {
    const container = document.getElementById('shop-container');
    if(!container) return;
    
    const searchInput = document.getElementById('shop-search');
    const term = searchInput ? searchInput.value.toLowerCase() : "";
    container.innerHTML = "";

    products.filter(p => {
        const searchMatch = p.nome.toLowerCase().includes(term);
        const categoryMatch = currentShopCat === 'todos' || p.cat === currentShopCat;
        const parentMatch = subMenuMap[currentShopCat]?.some(sub => sub.id === p.cat);
        return (categoryMatch || parentMatch) && searchMatch;
    }).forEach(p => {
        container.innerHTML += `
            <div class="product-card">
                <span class="stock-indicator ${p.estoque > 0 ? 'stock-ok' : 'stock-none'}">${p.estoque > 0 ? 'Disponível' : 'Esgotado'}</span>
                <img src="${p.img || 'https://via.placeholder.com/200'}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/200'">
                <h3>${p.nome}</h3>
                <div style="font-size:1.4rem; font-weight:700; color:var(--primary); margin:10px 0">R$ ${parseFloat(p.preco).toFixed(2)}</div>
                <button type="button" class="btn btn-green" onclick="addToCart(${p.id})" ${p.estoque <= 0 ? 'disabled' : ''}>Adicionar ao carrinho</button>
            </div>`;
    });
}

// ======================
// SISTEMA DE CARRINHO
// ======================
function toggleCart() {
    const side = document.getElementById('cart-sidebar');
    const overlay = document.getElementById('cart-overlay');
    if(!side) return;
    side.classList.toggle('open');
    if(overlay) overlay.style.display = side.classList.contains('open') ? 'block' : 'none';
}

function addToCart(id) {
    const p = products.find(prod => prod.id == id);
    const inCart = cart.find(i => i.id == id);
    if(inCart) inCart.qty++;
    else cart.push({...p, qty: 1});
    updateCart();
    toggleCart();
}

function updateCart() {
    const list = document.getElementById('cart-items-list');
    if(!list) return;
    list.innerHTML = "";
    let subtotal = 0;
    let count = 0;

    cart.forEach(item => {
        subtotal += item.preco * item.qty;
        count += item.qty;
        list.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px">
                <div style="flex:1">
                    <b>${item.nome}</b><br>
                    <small>R$ ${parseFloat(item.preco).toFixed(2)}</small>
                </div>
                <div style="display:flex; align-items:center; gap:8px">
                    <button type="button" onclick="changeQty(${item.id}, -1)" style="border:none; background:#eee; width:25px; height:25px; border-radius:5px; cursor:pointer">-</button>
                    <span>${item.qty}</span>
                    <button type="button" onclick="changeQty(${item.id}, 1)" style="border:none; background:#eee; width:25px; height:25px; border-radius:5px; cursor:pointer">+</button>
                    <button type="button" onclick="removeFromCart(${item.id})" style="border:none; color:red; background:none; font-size:1.2rem; cursor:pointer" aria-label="Remover item">×</button>
                </div>
            </div>`;
    });

    let totalFinal = subtotal - (subtotal * (descontoAtivo / 100));
    document.getElementById('cart-total').innerText = `R$ ${totalFinal.toFixed(2)}`;
    document.getElementById('cart-badge').innerText = count;
}

function changeQty(id, delta) {
    let item = cart.find(i => i.id == id);
    if(item) {
        item.qty += delta;
        if(item.qty <= 0) cart = cart.filter(i => i.id != id);
        updateCart();
    }
}

function removeFromCart(id) {
    cart = cart.filter(i => i.id != id);
    updateCart();
}

async function applyCoupon() {
    const input = document.getElementById('coupon').value.toUpperCase().trim();
    if(!input) return alert("Digite um cupom!");

    try {
        const { data, error } = await db
            .from('cupons')
            .select('*')
            .eq('codigo', input)
            .single();

        if(error || !data) {
            descontoAtivo = 0;
            cupomAplicadoNome = "";
            alert("Cupom inválido ou expirado!");
        } else {
            descontoAtivo = data.desconto;
            cupomAplicadoNome = input;
            alert(`Cupom ${input} de ${data.desconto}% aplicado com sucesso!`);
        }
        updateCart();
    } catch (err) {
        console.error(err);
    }
}

async function checkout() {
    if(cart.length === 0) return alert("Sua sacola está vazia!");
    
    let subtotal = cart.reduce((acc, curr) => acc + (curr.preco * curr.qty), 0);
    let totalFinal = subtotal - (subtotal * (descontoAtivo / 100));

    let msg = "NOVO PEDIDO - PARAÍSO PET STORE\n\n";
    cart.forEach(i => {
        msg += ` 🐾 ${i.nome} (x${i.qty}) - R$ ${(i.preco * i.qty).toFixed(2)}\n`;
    });
    if(descontoAtivo > 0) msg += `\n*Cupom:* ${cupomAplicadoNome} (-${descontoAtivo}%)`;
    msg += `\n\n*TOTAL: R$ ${totalFinal.toFixed(2)}*`;

    // Salva o pedido no Supabase
    await finalizarCompra("Cliente Loja", WHATS_NUMBER, totalFinal, cupomAplicadoNome);
    
    // Gera a URL otimizada para celular e computador
    const urlWhats = `https://api.whatsapp.com/send?phone=${WHATS_NUMBER}&text=${encodeURIComponent(msg)}`;
    
    // Redireciona diretamente na mesma aba, garantindo abertura do app no celular
    window.location.href = urlWhats;
}


async function finalizarCompra(nomeCliente, whatsCliente, totalComDesconto, cupom) {
    try {
        await db.from('pedidos').insert([
            { 
                cliente_nome: nomeCliente, 
                whatsapp: whatsCliente, 
                produtos_comprados: cart, 
                total: totalComDesconto,
                cupom_aplicado: cupom
            }
        ]);
    } catch (error) {
        console.error("Erro ao salvar pedido:", error.message);
    }
}

// ======================
// PAINEL ADMINISTRATIVO
// ======================
async function saveProduct() {
    const id = document.getElementById('form-id').value;
    const nome = document.getElementById('form-nome').value;
    const cat = document.getElementById('form-cat').value;
    const preco = parseFloat(document.getElementById('form-preco').value);
    const estoque = parseInt(document.getElementById('form-estoque').value);
    const img = document.getElementById('form-img').value;

    if(!nome || isNaN(preco)) return alert("Preencha os campos corretamente!");
    const productData = { nome, cat, preco, estoque, img };

    if(id) {
        const { error } = await db.from('produtos').update(productData).eq('id', id);
        if(error) return alert("Erro: " + error.message);
    } else {
        const { error } = await db.from('produtos').insert([productData]);
        if(error) return alert("Erro: " + error.message);
    }

    resetForm();
    await loadProductsFromSupabase();
    showPage('page-loja');
}

function renderAdmin() {
    const list = document.getElementById('admin-inventory-list');
    if(!list) return;
    const term = document.getElementById('admin-search').value.toLowerCase();
    list.innerHTML = "";

    products.filter(p => (currentAdminCat === 'todos' || p.cat === currentAdminCat) && p.nome.toLowerCase().includes(term))
    .forEach(p => {
        list.innerHTML += `
            <div class="inventory-card">
                <div style="display:flex; align-items:center; gap:15px">
                    <img src="${p.img || 'https://via.placeholder.com/40'}" alt="${p.nome}" style="width:40px;height:40px;object-fit:contain" onerror="this.src='https://via.placeholder.com/40'">
                    <div><b>${p.nome}</b><br><small>R$ ${parseFloat(p.preco).toFixed(2)} | Est: ${p.estoque}</small></div>
                </div>
                <div>
                    <button type="button" class="btn-edit" onclick="editProduct(${p.id})">Editar</button>
                    <button type="button" class="btn-del" onclick="deleteProduct(${p.id})">Remover</button>
                </div>
            </div>`;
    });
}

function editProduct(id) {
    const p = products.find(prod => prod.id == id);
    document.getElementById('form-id').value = p.id;
    document.getElementById('form-nome').value = p.nome;
    document.getElementById('form-cat').value = p.cat;
    document.getElementById('form-preco').value = p.preco;
    document.getElementById('form-estoque').value = p.estoque;
    document.getElementById('form-img').value = p.img;
    window.scrollTo(0,0);
}

function resetForm() {
    document.getElementById('form-id').value = "";
    document.getElementById('form-nome').value = "";
    document.getElementById('form-preco').value = "";
    document.getElementById('form-estoque').value = "";
    document.getElementById('form-img').value = "";
}

async function deleteProduct(id) {
    if(confirm("Excluir permanentemente?")) {
        const { error } = await db.from('produtos').delete().eq('id', id);
        if(error) return alert("Erro: " + error.message);
        await loadProductsFromSupabase();
    }
}

// ==========================================
// GERENCIAMENTO DE CUPONS (SUPABASE)
// ==========================================
async function renderCupons() {
    const listaDiv = document.getElementById('cupons-lista');
    if (!listaDiv) return;

    try {
        const { data: listaDeCupons, error } = await db
            .from('cupons')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;
        listaDiv.innerHTML = '';

        if (!listaDeCupons || listaDeCupons.length === 0) {
            listaDiv.innerHTML = '<p style="color: gray; font-style: italic;">Nenhum cupom ativo no momento.</p>';
            return;
        }

        listaDeCupons.forEach(cupom => {
            listaDiv.innerHTML += `
                <div class="inventory-card" style="border-left: 5px solid var(--accent)">
                    <div>
                        <strong style="color: #1a365d;">${cupom.codigo}</strong> 
                        <span style="color: #4a5568; margin-left: 10px;">| Desconto: ${cupom.desconto}%</span>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="editarCupom(${cupom.id}, '${cupom.codigo}', ${cupom.desconto})">Editar</button>
                        <button class="btn-del" onclick="removerCupom(${cupom.id})">Remover</button>
                    </div>
                </div>`;
        });
    } catch (error) {
        console.error("Erro ao carregar cupons:", error.message);
    }
}

async function criarCupom() {
    const codigoInput = document.getElementById('cupom-nome'); 
    const descontoInput = document.getElementById('cupom-valor');

    if (!codigoInput || !descontoInput) return;

    const codigo = codigoInput.value.trim().toUpperCase();
    const desconto = parseFloat(descontoInput.value);

    if (!codigo || isNaN(desconto)) {
        return alert("Por favor, preencha o código do cupom e o valor do desconto corretamente!");
    }

    try {
        const { error } = await db
            .from('cupons')
            .insert([{ codigo: codigo, desconto: desconto }]);

        if (error) {
            if (error.code === '23505') {
                return alert("Já existe um cupom cadastrado com este código!");
            }
            throw error;
        }

        alert("Cupom criado com sucesso!");
        codigoInput.value = '';
        descontoInput.value = '';
        renderCupons();
    } catch (error) {
        alert("Erro ao criar cupom: " + error.message);
    }
}

async function removerCupom(id) {
    if (!confirm("Tem certeza que deseja excluir este cupom?")) return;
    try {
        const { error } = await db.from('cupons').delete().eq('id', id);
        if (error) throw error;
        alert("Cupom removido!");
        renderCupons();
    } catch (error) {
        alert("Erro ao remover cupom: " + error.message);
    }
}

async function editarCupom(id, codigoAtual, descontoAtual) {
    const novoCodigo = prompt("Digite o novo código do cupom:", codigoAtual);
    if (novoCodigo === null) return;

    const novoDescontoTexto = prompt("Digite a nova porcentagem de desconto:", descontoAtual);
    if (novoDescontoTexto === null) return;
    
    const novoDesconto = parseFloat(novoDescontoTexto);
    if (!novoCodigo.trim() || isNaN(novoDesconto)) {
        return alert("Valores inválidos inseridos. Edição cancelada.");
    }

    try {
        const { error } = await db
            .from('cupons')
            .update({ codigo: novoCodigo.trim().toUpperCase(), desconto: novoDesconto })
            .eq('id', id);

        if (error) throw error;
        alert("Cupom editado com sucesso!");
        renderCupons();
    } catch (error) {
        alert("Erro ao editar cupom: " + error.message);
    }
}
